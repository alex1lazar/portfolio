# Next.js on Netlify: use the official runtime (do not publish the old CRA `build/` folder).
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
# publish must differ from the site base (repo root); empty UI publish defaults to root and breaks the plugin.
# https://github.com/netlify-templates/next-platform-starter/blob/main/netlify.toml
#
# NEVER commit these (they will break production — white screen or 404):
#   - public/index.html     → empty #root; Netlify may prefer it over Next for /
#   - public/_redirects     → SPA /* → index.html breaks /_next/static/* (JS/CSS as HTML)
# `npm run build` runs scripts/check-netlify-public.cjs first and exits with an error if they exist.
#
# @netlify/plugin-nextjs (in package.json dependencies) wires OpenNext: without it, Netlify
# may publish `.next` as static files only → generic "Page not found" for `/`.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
