# Next.js on Netlify: use the official runtime (do not publish the old CRA `build/` folder).
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/
# publish must differ from the site base (repo root); empty UI publish defaults to root and breaks the plugin.
# https://github.com/netlify-templates/next-platform-starter/blob/main/netlify.toml
#
# Do not add a CRA-style `public/_redirects` rule like `/* /index.html 200` — it rewrites
# `/_next/static/*` to HTML and the site renders blank.
# Do not commit `public/index.html` (CRA shell). Netlify may serve it for `/` and you get a blank page.
#
# Let Netlify inject the latest OpenNext adapter (recommended for Next 13.5+). Pinning
# @netlify/plugin-nextjs in package.json can leave you on an older runtime.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
